<!DOCTYPE html>
<html>

<head>
    <title>Game Pria Solo Hunter</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        #gameArea {
            width: 600px;
            height: 400px;
            border: 3px solid black;
            margin: auto;
            position: relative;
            background: white;
        }

        #box {
            width: 60px;
            height: 60px;
            background-image: url("pria_solo.jpeg");
            background-size: cover;
            background-position: center;
            position: absolute;
            display: none;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Pria Solo Hunter</h1>
    <p>Klik gambar pria solo sebanyak mungkin!</p>

    <h2>Score: <span id="score">0</span></h2>
    <h3>Time: <span id="time">30</span></h3>

    <button onclick="startGame()">Start Game</button>

    <div id="gameArea">
        <div id="box"></div>
    </div>

    <script>

        let score = 0
        let time = 30
        let gameRunning = false

        const box = document.getElementById("box")
        const gameArea = document.getElementById("gameArea")

        box.onclick = function () {
            if (!gameRunning) return

            score++
            document.getElementById("score").innerText = score

            moveBox()
        }

        function moveBox() {

            let x = Math.random() * (gameArea.clientWidth - 50)
            let y = Math.random() * (gameArea.clientHeight - 50)

            box.style.left = x + "px"
            box.style.top = y + "px"
            box.style.display = "block"
        }

        function startGame() {

            score = 0
            time = 30
            gameRunning = true

            document.getElementById("score").innerText = score
            document.getElementById("time").innerText = time

            moveBox()

            let timer = setInterval(function () {

                time--
                document.getElementById("time").innerText = time

                if (time <= 0) {
                    clearInterval(timer)
                    gameRunning = false
                    box.style.display = "none"
                    alert("Game selesai! Score kamu: " + score)
                }

            }, 1000)

        }

    </script>

</body>

</html>
